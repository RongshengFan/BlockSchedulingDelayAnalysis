<svg width="2048" height="1365" viewBox="0 0 2048 1365" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <marker id="arrow" markerWidth="16" markerHeight="16" refX="14" refY="8" orient="auto">
      <path d="M0 0L16 8L0 16V0Z" fill="#AEB6BE"/>
    </marker>
    <style>
      .title { font: 700 40px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #22282E; }
      .subtitle { font: 500 27px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #22282E; }
      .sectionTitle { font: 700 27px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #22282E; }
      .body { font: 500 25px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #22282E; }
      .mono { font: 500 25px "SFMono-Regular", "Menlo", "Consolas", monospace; fill: #22282E; }
      .monoSmall { font: 500 22px "SFMono-Regular", "Menlo", "Consolas", monospace; fill: #22282E; }
      .smallTitle { font: 700 27px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #22282E; }
      .stage { font: 700 19px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #7D8994; }
      .supportTitle { font: 700 31px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #22282E; }
      .supportText { font: 500 27px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #000000; }
    </style>
  </defs>

  <rect x="20" y="20" width="2008" height="1325" rx="4" fill="#FFFFFF" stroke="#D7DCE0"/>

  <g>
    <rect x="78" y="75" width="535" height="885" rx="4" fill="#F2FEFC" stroke="#36424A" stroke-width="1.5"/>
    <rect x="135" y="99" width="108" height="57" rx="28.5" fill="#E1FAF7" stroke="#CDEBE7"/>
    <text x="189" y="135" text-anchor="middle" class="stage">阶段一</text>

    <text x="110" y="218" class="title">Block 调度数据采集</text>
    <text x="110" y="272" class="subtitle">获取 Block 级原始观测数据</text>
    <path d="M110 316H581" stroke="#C4CBD0" stroke-width="1.5"/>

    <rect x="110" y="358" width="471" height="161" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="134" y="410" class="sectionTitle">探针定义</text>
    <text x="134" y="457" class="mono">probe/probe.py</text>
    <text x="134" y="504" class="body">记录 start_clock、elapsed、sm</text>

    <rect x="110" y="561" width="471" height="161" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="134" y="613" class="sectionTitle">负载执行</text>
    <text x="134" y="660" class="mono">workloads/collect_workloads.sh</text>
    <text x="134" y="707" class="body">按 workload 和 batch size 组合运行</text>

    <rect x="110" y="764" width="471" height="161" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="134" y="816" class="sectionTitle">Trace输出</text>
    <text x="134" y="863" class="mono">traces/</text>
    <text x="134" y="910" class="body">保留 .bin 文件与解析脚本</text>
  </g>

  <g>
    <rect x="750" y="75" width="535" height="885" rx="4" fill="#F8FAFD" stroke="#36424A" stroke-width="1.5"/>
    <rect x="807" y="99" width="108" height="57" rx="28.5" fill="#F1F5FF" stroke="#AFC5FF"/>
    <text x="861" y="135" text-anchor="middle" class="stage">阶段二</text>

    <text x="782" y="218" class="title">Trace 解析与指标计算</text>
    <text x="782" y="272" class="subtitle">生成结构化数据，计算统计指标</text>
    <path d="M782 316H1253" stroke="#C4CBD0" stroke-width="1.5"/>

    <rect x="782" y="358" width="471" height="161" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="806" y="410" class="sectionTitle">结构化解析</text>
    <text x="806" y="457" class="mono">analysis/parse_to_csv.py</text>
    <text x="806" y="504" class="body">生成 block 级 CSV 明细表</text>

    <rect x="782" y="561" width="471" height="161" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="806" y="613" class="sectionTitle">Sched 重建</text>
    <text x="806" y="660" class="monoSmall">analysis/recompute_sched_metrics.py</text>
    <text x="806" y="707" class="body">重建同一 SM 内 Block 接替关系</text>

    <rect x="782" y="764" width="471" height="161" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="806" y="816" class="sectionTitle">负载统计</text>
    <text x="806" y="863" class="mono">analysis/analyze_and_plot.py</text>
    <text x="806" y="910" class="body">计算 load 与 elapsed 对照指标</text>
  </g>

  <g>
    <rect x="1422" y="75" width="535" height="885" rx="4" fill="#F2FEFC" stroke="#36424A" stroke-width="1.5"/>
    <rect x="1479" y="99" width="108" height="57" rx="28.5" fill="#E8FBE9" stroke="#AEEFB2"/>
    <text x="1533" y="135" text-anchor="middle" class="stage">阶段三</text>

    <text x="1454" y="218" class="title">结果组织与可视化</text>
    <text x="1454" y="272" class="subtitle">输出图表、报告与浏览界面</text>
    <path d="M1454 316H1925" stroke="#C4CBD0" stroke-width="1.5"/>

    <rect x="1454" y="358" width="471" height="161" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="1478" y="410" class="sectionTitle">结果组织</text>
    <text x="1478" y="454" class="mono">output/data</text>
    <text x="1478" y="486" class="mono">output/chart/metrics</text>
    <text x="1478" y="512" class="body">保存明细数据与指标汇总表</text>

    <rect x="1454" y="561" width="471" height="161" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="1478" y="613" class="sectionTitle">静态图表</text>
    <text x="1478" y="660" class="mono">sched / load / correlation</text>
    <text x="1478" y="707" class="body">生成调度与负载图表</text>

    <rect x="1454" y="764" width="471" height="161" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="1478" y="816" class="sectionTitle">Dashboard展示</text>
    <text x="1478" y="863" class="mono">dashboard/server.py</text>
    <text x="1478" y="910" class="body">只读浏览分析结果</text>
  </g>

  <path d="M615 517H747" stroke="#AEB6BE" stroke-width="3" marker-end="url(#arrow)"/>
  <path d="M1287 517H1419" stroke="#AEB6BE" stroke-width="3" marker-end="url(#arrow)"/>

  <g>
    <rect x="78" y="1005" width="535" height="116" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="116" y="1058" class="smallTitle">原始Trace</text>
    <text x="110" y="1107" class="mono">traces/&lt;workload&gt;/bs*/trace/</text>

    <rect x="750" y="1005" width="535" height="116" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="788" y="1058" class="smallTitle">结构化数据</text>
    <text x="782" y="1107" class="mono">output/data/ + output/chart/metrics</text>

    <rect x="1422" y="1005" width="535" height="116" rx="4" fill="#FFFFFF" stroke="#CDD1D4"/>
    <text x="1460" y="1058" class="smallTitle">图表与展示结果</text>
    <text x="1454" y="1107" class="mono">output/chart/ + dashboard/</text>
  </g>

  <g>
    <rect x="78" y="1163" width="1879" height="138" rx="4" fill="#FFFFFF" stroke="#E2E8F0"/>
    <text x="122" y="1248" class="supportTitle">辅助模块</text>
    <text x="364" y="1214" class="mono">cli.py</text>
    <text x="484" y="1214" class="mono">config_loader.py</text>
    <text x="746" y="1214" class="mono">scenario_runner.py</text>
    <text x="1040" y="1214" class="mono">validators.py</text>
    <text x="1255" y="1214" class="mono">metrics_guard.py</text>
    <text x="1530" y="1214" class="mono">reporting.py</text>
    <text x="364" y="1267" class="supportText">用于批量执行、配置管理、数据校验和结果整理</text>
  </g>
</svg>
