<svg width="2140" height="1180" viewBox="0 0 2140 1180" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="2140" y2="1180" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCFDFE"/>
      <stop offset="1" stop-color="#F4F8FB"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0" y1="0" x2="2140" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17324D"/>
      <stop offset="1" stop-color="#325F69"/>
    </linearGradient>
    <linearGradient id="layer1" x1="180" y1="180" x2="1560" y2="312" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F3F8FF"/>
      <stop offset="1" stop-color="#FBFDFF"/>
    </linearGradient>
    <linearGradient id="layer2" x1="180" y1="340" x2="1560" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4FBF8"/>
      <stop offset="1" stop-color="#FBFEFD"/>
    </linearGradient>
    <linearGradient id="layer3" x1="180" y1="500" x2="1560" y2="632" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7FAFD"/>
      <stop offset="1" stop-color="#FCFDFF"/>
    </linearGradient>
    <linearGradient id="layer4" x1="180" y1="660" x2="1560" y2="792" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6FBF7"/>
      <stop offset="1" stop-color="#FCFEFD"/>
    </linearGradient>
    <linearGradient id="layer5" x1="180" y1="820" x2="1560" y2="952" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F5F8FC"/>
      <stop offset="1" stop-color="#FCFDFF"/>
    </linearGradient>
    <linearGradient id="layer6" x1="180" y1="980" x2="1560" y2="1112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F8FAFD"/>
      <stop offset="1" stop-color="#FEFFFF"/>
    </linearGradient>
    <linearGradient id="supportCol" x1="1640" y1="180" x2="1960" y2="1112" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F7F9FC"/>
      <stop offset="1" stop-color="#FCFDFF"/>
    </linearGradient>
    <filter id="shadow" x="-50" y="-50" width="2240" height="1280" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="14" stdDeviation="20" flood-color="#15314C" flood-opacity="0.08"/>
    </filter>
    <filter id="soft" x="-20" y="-20" width="2180" height="1220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#15314C" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#71859B"/>
    </marker>
    <style>
      .title { font: 700 36px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #102A43; }
      .subtitle { font: 500 16px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #62788D; }
      .layerTitle { font: 700 27px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #16324F; }
      .layerBody { font: 500 15px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #596F84; }
      .chip { font: 700 13px "Helvetica Neue", Arial, sans-serif; letter-spacing: 1.6px; fill: #FFFFFF; }
      .pathLabel { font: 700 13px "Helvetica Neue", Arial, sans-serif; letter-spacing: 1.2px; fill: #5F758A; }
      .mono { font: 600 14px "SFMono-Regular", "Menlo", "Consolas", monospace; fill: #23425B; }
      .boxTitle { font: 700 17px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #17324D; }
      .boxBody { font: 500 13.5px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #576D82; }
    </style>
  </defs>

  <rect width="2140" height="1180" fill="url(#bg)"/>
  <rect x="0" y="0" width="2140" height="10" fill="url(#topLine)"/>

  <text x="1070" y="82" text-anchor="middle" class="title">GPU Block 调度延迟分析工具系统架构图</text>
  <text x="1070" y="114" text-anchor="middle" class="subtitle">从工程实现角度，系统由采集定义、负载执行、原始数据、分析计算、结果产出、展示与验证等层次构成，并围绕 traces、结构化表与图表结果逐层流转。</text>

  <g opacity="0.6">
    <path d="M150 150H1990" stroke="#D6E0EA" stroke-width="1.5"/>
    <path d="M870 176V1160" stroke="#D4DFEA" stroke-width="2" stroke-dasharray="8 10"/>
    <path d="M1600 180V1112" stroke="#D4DFEA" stroke-width="1.5" stroke-dasharray="8 10"/>
  </g>

  <g>
    <path d="M870 312V336" stroke="#71859B" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M870 472V496" stroke="#71859B" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M870 632V656" stroke="#71859B" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M870 792V816" stroke="#71859B" stroke-width="4" marker-end="url(#arrow)"/>
    <path d="M870 952V976" stroke="#71859B" stroke-width="4" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="180" y="180" width="1380" height="132" rx="28" fill="url(#layer1)" stroke="#D9E5F1" stroke-width="1.5"/>
    <rect x="180" y="340" width="1380" height="132" rx="28" fill="url(#layer2)" stroke="#D8EAE4" stroke-width="1.5"/>
    <rect x="180" y="500" width="1380" height="132" rx="28" fill="url(#layer3)" stroke="#DDE4ED" stroke-width="1.5"/>
    <rect x="180" y="660" width="1380" height="132" rx="28" fill="url(#layer4)" stroke="#D8EAE2" stroke-width="1.5"/>
    <rect x="180" y="820" width="1380" height="132" rx="28" fill="url(#layer5)" stroke="#DDE4ED" stroke-width="1.5"/>
    <rect x="180" y="980" width="1380" height="132" rx="28" fill="url(#layer6)" stroke="#DEE4EC" stroke-width="1.5"/>
    <rect x="1640" y="180" width="320" height="932" rx="30" fill="url(#supportCol)" stroke="#DFE5ED" stroke-width="1.5"/>
  </g>

  <g filter="url(#soft)">
    <rect x="214" y="214" width="124" height="34" rx="17" fill="#2A6F97"/>
    <text x="276" y="236" text-anchor="middle" class="chip">LAYER 1</text>
    <text x="374" y="236" class="layerTitle">采集定义层</text>
    <text x="374" y="266" class="layerBody">定义 Neutrino probe 及 block 级观测字段，明确采集目标、记录内容与基础数据模型。</text>
    <rect x="1294" y="212" width="220" height="38" rx="19" fill="#FFFFFF" stroke="#DCE6F1"/>
    <text x="1328" y="235" class="pathLabel">PATH</text>
    <text x="1404" y="236" text-anchor="middle" class="mono">probe/</text>
  </g>

  <g filter="url(#soft)">
    <rect x="214" y="374" width="124" height="34" rx="17" fill="#2F8F83"/>
    <text x="276" y="396" text-anchor="middle" class="chip">LAYER 2</text>
    <text x="374" y="396" class="layerTitle">负载执行层</text>
    <text x="374" y="426" class="layerBody">
      <tspan x="374" dy="0">组织 compute、memory、mixed、sparse、vgg16 等 workload 与 batch 组合，</tspan>
      <tspan x="374" dy="22">并驱动 CUDA 负载执行与批量采集。</tspan>
    </text>
    <rect x="1246" y="372" width="268" height="38" rx="19" fill="#FFFFFF" stroke="#D9EAE4"/>
    <text x="1280" y="395" class="pathLabel">PATH</text>
    <text x="1380" y="396" text-anchor="middle" class="mono">workloads/</text>
  </g>

  <g filter="url(#soft)">
    <rect x="214" y="534" width="124" height="34" rx="17" fill="#5B6C8F"/>
    <text x="276" y="556" text-anchor="middle" class="chip">LAYER 3</text>
    <text x="374" y="556" class="layerTitle">原始数据层</text>
    <text x="374" y="586" class="layerBody">
      <tspan x="374" dy="0">保存 Neutrino 采集得到的二进制 trace、event log 与辅助读取脚本，</tspan>
      <tspan x="374" dy="22">作为后续解析与计算的统一输入来源。</tspan>
    </text>
    <rect x="1232" y="532" width="282" height="38" rx="19" fill="#FFFFFF" stroke="#E0E6EE"/>
    <text x="1266" y="555" class="pathLabel">PATH</text>
    <text x="1373" y="556" text-anchor="middle" class="mono">traces/</text>
  </g>

  <g filter="url(#soft)">
    <rect x="214" y="694" width="124" height="34" rx="17" fill="#2E7D69"/>
    <text x="276" y="716" text-anchor="middle" class="chip">LAYER 4</text>
    <text x="374" y="716" class="layerTitle">分析计算层</text>
    <text x="374" y="746" class="layerBody">
      <tspan x="374" dy="0">完成 trace 解析、Sched 指标重建、负载均衡统计与图表计算，</tspan>
      <tspan x="374" dy="22">生成结构化表与分析所需的核心结果。</tspan>
    </text>
    <rect x="1206" y="692" width="308" height="38" rx="19" fill="#FFFFFF" stroke="#DBEAE4"/>
    <text x="1240" y="715" class="pathLabel">PATH</text>
    <text x="1360" y="716" text-anchor="middle" class="mono">analysis/</text>
  </g>

  <g filter="url(#soft)">
    <rect x="214" y="854" width="124" height="34" rx="17" fill="#5B6C8F"/>
    <text x="276" y="876" text-anchor="middle" class="chip">LAYER 5</text>
    <text x="374" y="876" class="layerTitle">结果产出层</text>
    <text x="374" y="906" class="layerBody">
      <tspan x="374" dy="0">输出 block 级结构化表、指标汇总表与静态图，形成统一的结果数据面，</tspan>
      <tspan x="374" dy="22">为比较分析与可视化展示提供数据支撑。</tspan>
    </text>
    <rect x="1080" y="852" width="434" height="38" rx="19" fill="#FFFFFF" stroke="#E0E6EE"/>
    <text x="1114" y="875" class="pathLabel">PATH</text>
    <text x="1297" y="876" text-anchor="middle" class="mono">output/data/   +   output/chart/</text>
  </g>

  <g filter="url(#soft)">
    <rect x="214" y="1014" width="124" height="34" rx="17" fill="#6A7B97"/>
    <text x="276" y="1036" text-anchor="middle" class="chip">LAYER 6</text>
    <text x="374" y="1036" class="layerTitle">展示与验证层</text>
    <text x="374" y="1066" class="layerBody">
      <tspan x="374" dy="0">通过本地 Dashboard 浏览结构化结果，并结合测试与守卫脚本完成基础验证，</tspan>
      <tspan x="374" dy="22">支撑结果检查、展示与复现实验。</tspan>
    </text>
    <rect x="1032" y="1012" width="482" height="38" rx="19" fill="#FFFFFF" stroke="#E0E6EE"/>
    <text x="1066" y="1035" class="pathLabel">PATH</text>
    <text x="1273" y="1036" text-anchor="middle" class="mono">dashboard/   +   tests/   +   validators</text>
  </g>

  <g>
    <g filter="url(#soft)">
      <rect x="1670" y="214" width="260" height="174" rx="24" fill="#FFFFFF" stroke="#DFE5ED"/>
      <rect x="1748" y="238" width="104" height="30" rx="15" fill="#6A7B97"/>
      <text x="1800" y="258" text-anchor="middle" class="chip">SUPPORT</text>
      <text x="1800" y="300" text-anchor="middle" class="layerTitle">运行支撑层</text>
      <text x="1800" y="332" text-anchor="middle" class="layerBody">
        <tspan x="1800" dy="0">为六层链路提供统一运行基础、</tspan>
        <tspan x="1800" dy="22">参数入口与实验复现支撑</tspan>
      </text>
    </g>

    <g filter="url(#soft)">
      <rect x="1670" y="430" width="260" height="120" rx="22" fill="#FFFFFF" stroke="#DFE5ED"/>
      <text x="1800" y="466" text-anchor="middle" class="boxTitle">运行基础</text>
      <text x="1800" y="496" text-anchor="middle" class="boxBody">
        <tspan x="1800" dy="0">提供项目内置的观测运行环境，</tspan>
        <tspan x="1800" dy="22">支撑采集与分析链路执行</tspan>
      </text>
      <text x="1800" y="534" text-anchor="middle" class="mono">neutrino/</text>
    </g>

    <g filter="url(#soft)">
      <rect x="1670" y="582" width="260" height="120" rx="22" fill="#FFFFFF" stroke="#DFE5ED"/>
      <text x="1800" y="618" text-anchor="middle" class="boxTitle">配置管理</text>
      <text x="1800" y="648" text-anchor="middle" class="boxBody">
        <tspan x="1800" dy="0">维护 pipeline 与场景参数，</tspan>
        <tspan x="1800" dy="22">统一实验入口与运行口径</tspan>
      </text>
      <text x="1800" y="686" text-anchor="middle" class="mono">configs/</text>
    </g>

    <g filter="url(#soft)">
      <rect x="1670" y="734" width="260" height="170" rx="22" fill="#FFFFFF" stroke="#DFE5ED"/>
      <text x="1800" y="770" text-anchor="middle" class="boxTitle">协同作用</text>
      <text x="1800" y="800" text-anchor="middle" class="boxBody">
        <tspan x="1800" dy="0">贯穿 workload 采集、trace 解析、</tspan>
        <tspan x="1800" dy="22">指标计算与结果展示全流程，</tspan>
        <tspan x="1800" dy="22">从工程层面保证环境一致、</tspan>
        <tspan x="1800" dy="22">流程稳定与实验可复现。</tspan>
      </text>
    </g>

    <g filter="url(#soft)">
      <rect x="1670" y="936" width="260" height="104" rx="22" fill="#FFFFFF" stroke="#DFE5ED"/>
      <text x="1800" y="972" text-anchor="middle" class="boxTitle">支撑对象</text>
      <text x="1800" y="1008" text-anchor="middle" class="mono">runtime   +   pipeline</text>
      <text x="1800" y="1032" text-anchor="middle" class="mono">scenario   +   reproducibility</text>
    </g>
  </g>
</svg>
