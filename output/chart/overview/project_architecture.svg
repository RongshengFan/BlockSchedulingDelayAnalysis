<svg width="1800" height="1100" viewBox="0 0 1800 1100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1800" y2="1100" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FCFDFE"/>
      <stop offset="1" stop-color="#F5F8FB"/>
    </linearGradient>
    <linearGradient id="topLine" x1="0" y1="0" x2="1800" y2="0" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#17324D"/>
      <stop offset="1" stop-color="#325F69"/>
    </linearGradient>
    <linearGradient id="cardBlue" x1="140" y1="220" x2="520" y2="870" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F3F8FF"/>
      <stop offset="1" stop-color="#FBFDFF"/>
    </linearGradient>
    <linearGradient id="cardGreen" x1="710" y1="220" x2="1090" y2="870" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F4FBF8"/>
      <stop offset="1" stop-color="#FBFEFD"/>
    </linearGradient>
    <linearGradient id="cardSlate" x1="1280" y1="220" x2="1660" y2="870" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#F6F8FC"/>
      <stop offset="1" stop-color="#FCFDFF"/>
    </linearGradient>
    <filter id="shadow" x="-50" y="-50" width="1900" height="1220" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#15314C" flood-opacity="0.08"/>
    </filter>
    <filter id="soft" x="-20" y="-20" width="1840" height="1180" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feDropShadow dx="0" dy="8" stdDeviation="10" flood-color="#15314C" flood-opacity="0.06"/>
    </filter>
    <marker id="arrow" markerWidth="14" markerHeight="14" refX="12" refY="7" orient="auto">
      <path d="M0 0L14 7L0 14V0Z" fill="#71859B"/>
    </marker>
    <style>
      .title { font: 700 36px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #102A43; }
      .subtitle { font: 500 16px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #62788D; }
      .chip { font: 700 13px "Helvetica Neue", Arial, sans-serif; letter-spacing: 1.8px; fill: #FFFFFF; }
      .stageTitle { font: 700 24px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #16324F; }
      .stageDesc { font: 500 15px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5F758A; }
      .boxTitle { font: 700 17px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #17324D; }
      .boxBody { font: 500 13.5px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #576D82; }
      .mono { font: 600 12.5px "SFMono-Regular", "Menlo", "Consolas", monospace; fill: #23425B; }
      .laneTitle { font: 700 22px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #17324D; }
      .laneBody { font: 500 13.5px "Helvetica Neue", "PingFang SC", "Microsoft YaHei", sans-serif; fill: #5F758A; }
    </style>
  </defs>

  <rect width="1800" height="1100" fill="url(#bg)"/>
  <rect x="0" y="0" width="1800" height="10" fill="url(#topLine)"/>

  <text x="900" y="82" text-anchor="middle" class="title">GPU Block 调度延迟分析工具总体流程图</text>
  <text x="900" y="114" text-anchor="middle" class="subtitle">工具链主流程由 Block调度数据采集、Trace解析与指标计算、结果组织与可视化展示三个阶段构成，结构化表格是连接分析计算与展示环节的关键中间结果。</text>

  <g opacity="0.6">
    <path d="M120 154H1680" stroke="#D6E0EA" stroke-width="1.5"/>
    <path d="M120 972H1680" stroke="#D6E0EA" stroke-width="1.5"/>
  </g>

  <g filter="url(#shadow)">
    <rect x="140" y="220" width="380" height="650" rx="30" fill="url(#cardBlue)" stroke="#D9E5F1" stroke-width="1.5"/>
    <rect x="710" y="220" width="380" height="650" rx="30" fill="url(#cardGreen)" stroke="#D8EAE4" stroke-width="1.5"/>
    <rect x="1280" y="220" width="380" height="650" rx="30" fill="url(#cardSlate)" stroke="#DDE4ED" stroke-width="1.5"/>
  </g>

  <g>
    <rect x="170" y="246" width="320" height="146" rx="24" fill="#FFFFFF" stroke="#DCE6F1"/>
    <rect x="288" y="268" width="84" height="30" rx="15" fill="#2A6F97"/>
    <text x="330" y="288" text-anchor="middle" class="chip">STAGE 1</text>
    <text x="330" y="330" text-anchor="middle" class="stageTitle">Block调度数据采集</text>
    <text x="330" y="360" text-anchor="middle" class="stageDesc">
      <tspan x="330" dy="0">基于 Neutrino 对典型 workload 开展观测，</tspan>
      <tspan x="330" dy="22">采集 block 级原始 trace 数据</tspan>
    </text>

    <g filter="url(#soft)">
      <rect x="170" y="430" width="320" height="128" rx="22" fill="#FFFFFF" stroke="#DCE6F1"/>
      <text x="330" y="466" text-anchor="middle" class="boxTitle">采集配置</text>
      <text x="330" y="496" text-anchor="middle" class="boxBody">
        <tspan x="330" dy="0">统一配置 workload 与 probe，记录 block 起始时刻、</tspan>
        <tspan x="330" dy="22">执行时长及 SM 信息等基础观测字段</tspan>
      </text>
      <text x="330" y="537" text-anchor="middle" class="mono">workloads/   +   probe/</text>
    </g>

    <g filter="url(#soft)">
      <rect x="170" y="584" width="320" height="128" rx="22" fill="#FFFFFF" stroke="#DCE6F1"/>
      <text x="330" y="620" text-anchor="middle" class="boxTitle">批量采集执行</text>
      <text x="330" y="650" text-anchor="middle" class="boxBody">
        <tspan x="330" dy="0">按 workload × batch 组合驱动实验，</tspan>
        <tspan x="330" dy="22">形成可复现的原始 trace 数据集</tspan>
      </text>
      <text x="330" y="691" text-anchor="middle" class="mono">collect_workloads.sh</text>
    </g>

    <g filter="url(#soft)">
      <rect x="170" y="738" width="320" height="96" rx="22" fill="#FFFFFF" stroke="#DCE6F1"/>
      <text x="330" y="774" text-anchor="middle" class="boxTitle">原始 Trace 数据</text>
      <text x="330" y="802" text-anchor="middle" class="mono">traces/&lt;workload&gt;/bs*/trace/*/</text>
      <text x="330" y="822" text-anchor="middle" class="mono">result/*.bin   event.log   read.py</text>
    </g>
  </g>

  <g>
    <rect x="740" y="246" width="320" height="146" rx="24" fill="#FFFFFF" stroke="#D9EAE4"/>
    <rect x="858" y="268" width="84" height="30" rx="15" fill="#2F8F83"/>
    <text x="900" y="288" text-anchor="middle" class="chip">STAGE 2</text>
    <text x="900" y="330" text-anchor="middle" class="stageTitle">Trace解析与指标计算</text>
    <text x="900" y="360" text-anchor="middle" class="stageDesc">
      <tspan x="900" dy="0">将原始 trace 解析为结构化表格，</tspan>
      <tspan x="900" dy="22">并完成 sched 与负载均衡指标计算</tspan>
    </text>

    <g filter="url(#soft)">
      <rect x="740" y="430" width="320" height="128" rx="22" fill="#FFFFFF" stroke="#D9EAE4"/>
      <text x="900" y="466" text-anchor="middle" class="boxTitle">Trace解析</text>
      <text x="900" y="496" text-anchor="middle" class="boxBody">
        <tspan x="900" dy="0">读取原始 trace 与辅助脚本，输出统一的</tspan>
        <tspan x="900" dy="22">block 级明细表作为标准分析输入</tspan>
      </text>
      <text x="900" y="537" text-anchor="middle" class="mono">parse_to_csv.py</text>
    </g>

    <g filter="url(#soft)">
      <rect x="740" y="584" width="320" height="128" rx="22" fill="#FFFFFF" stroke="#D9EAE4"/>
      <text x="900" y="620" text-anchor="middle" class="boxTitle">指标计算</text>
      <text x="900" y="650" text-anchor="middle" class="boxBody">
        <tspan x="900" dy="0">围绕 sched、负载均衡与统计摘要开展汇总，</tspan>
        <tspan x="900" dy="22">形成结构化结果与后续展示所需图表</tspan>
      </text>
      <text x="900" y="691" text-anchor="middle" class="mono">recompute_sched_metrics.py</text>
    </g>

    <g filter="url(#soft)">
      <rect x="740" y="738" width="320" height="96" rx="22" fill="#FFFFFF" stroke="#D9EAE4"/>
      <text x="900" y="774" text-anchor="middle" class="boxTitle">结构化结果</text>
      <text x="900" y="802" text-anchor="middle" class="mono">analyze_and_plot.py</text>
      <text x="900" y="822" text-anchor="middle" class="mono">output/data/   +   output/chart/metrics/</text>
    </g>
  </g>

  <g>
    <rect x="1310" y="246" width="320" height="146" rx="24" fill="#FFFFFF" stroke="#DFE5ED"/>
    <rect x="1428" y="268" width="84" height="30" rx="15" fill="#5B6C8F"/>
    <text x="1470" y="288" text-anchor="middle" class="chip">STAGE 3</text>
    <text x="1470" y="330" text-anchor="middle" class="stageTitle">结果组织与可视化展示</text>
    <text x="1470" y="360" text-anchor="middle" class="stageDesc">
      <tspan x="1470" dy="0">围绕结构化结果完成结果组织与展示编排，</tspan>
      <tspan x="1470" dy="22">支持比较分析、结果浏览与论文呈现</tspan>
    </text>

    <g filter="url(#soft)">
      <rect x="1310" y="430" width="320" height="128" rx="22" fill="#FFFFFF" stroke="#DFE5ED"/>
      <text x="1470" y="466" text-anchor="middle" class="boxTitle">结果组织</text>
      <text x="1470" y="496" text-anchor="middle" class="boxBody">
        <tspan x="1470" dy="0">保存 block 级表格、指标汇总表与分析结果，</tspan>
        <tspan x="1470" dy="22">为展示层提供统一的数据来源</tspan>
      </text>
      <text x="1470" y="537" text-anchor="middle" class="mono">output/data/   +   output/chart/metrics/</text>
    </g>

    <g filter="url(#soft)">
      <rect x="1310" y="584" width="320" height="128" rx="22" fill="#FFFFFF" stroke="#DFE5ED"/>
      <text x="1470" y="620" text-anchor="middle" class="boxTitle">静态图展示</text>
      <text x="1470" y="650" text-anchor="middle" class="boxBody">
        <tspan x="1470" dy="0">输出 sched、负载均衡与总体概览图表，</tspan>
        <tspan x="1470" dy="22">支持不同 workload 与 batch 的比较分析</tspan>
      </text>
      <text x="1470" y="691" text-anchor="middle" class="mono">output/chart/sched/   +   load/   +   overview/</text>
    </g>

    <g filter="url(#soft)">
      <rect x="1310" y="738" width="320" height="96" rx="22" fill="#FFFFFF" stroke="#DFE5ED"/>
      <text x="1470" y="774" text-anchor="middle" class="boxTitle">交互式展示</text>
      <text x="1470" y="802" text-anchor="middle" class="boxBody">按 workload / batch 浏览图表与结构化结论</text>
      <text x="1470" y="822" text-anchor="middle" class="mono">dashboard/server.py   +   static/</text>
    </g>
  </g>

  <g>
    <path d="M520 545H660" stroke="#71859B" stroke-width="4.5" marker-end="url(#arrow)"/>
    <path d="M1090 545H1230" stroke="#71859B" stroke-width="4.5" marker-end="url(#arrow)"/>
  </g>

  <g filter="url(#soft)">
    <rect x="140" y="916" width="1520" height="138" rx="28" fill="#FFFFFF" stroke="#D9E1EA" stroke-width="1.5"/>
  </g>

  <g>
    <rect x="260" y="950" width="104" height="28" rx="14" fill="#6A7B97"/>
    <text x="312" y="969" text-anchor="middle" class="chip">SUPPORT</text>
    <text x="570" y="972" text-anchor="end" class="laneTitle">辅助支撑模块</text>
    <text x="636" y="970" class="laneBody">用于批量执行、配置管理、结果检查与整理，并支撑场景矩阵运行、结构化报告导出与附加分析，从工程层面提升实验复现性与项目可用性。</text>

    <g filter="url(#soft)">
      <rect x="235" y="1004" width="150" height="36" rx="16" fill="#F8FAFD" stroke="#E2E8F0"/>
      <text x="310" y="1027" text-anchor="middle" class="mono">cli.py</text>
    </g>

    <g filter="url(#soft)">
      <rect x="413" y="1004" width="200" height="36" rx="16" fill="#F8FAFD" stroke="#E2E8F0"/>
      <text x="513" y="1027" text-anchor="middle" class="mono">config_loader.py</text>
    </g>

    <g filter="url(#soft)">
      <rect x="641" y="1004" width="200" height="36" rx="16" fill="#F8FAFD" stroke="#E2E8F0"/>
      <text x="741" y="1027" text-anchor="middle" class="mono">scenario_runner.py</text>
    </g>

    <g filter="url(#soft)">
      <rect x="869" y="1004" width="180" height="36" rx="16" fill="#F8FAFD" stroke="#E2E8F0"/>
      <text x="959" y="1027" text-anchor="middle" class="mono">validators.py</text>
    </g>

    <g filter="url(#soft)">
      <rect x="1077" y="1004" width="190" height="36" rx="16" fill="#F8FAFD" stroke="#E2E8F0"/>
      <text x="1172" y="1027" text-anchor="middle" class="mono">metrics_guard.py</text>
    </g>

    <g filter="url(#soft)">
      <rect x="1295" y="1004" width="270" height="36" rx="16" fill="#F8FAFD" stroke="#E2E8F0"/>
      <text x="1430" y="1027" text-anchor="middle" class="mono">reporting.py   +   ablation.py</text>
    </g>
  </g>
</svg>
